<template id="notice-template">
    <div class="col-md-6 col-lg-4">
        <div class="notice shadow" data-id="{{id}}">
            <div class="title">{{title}}</div> <!-- ToDo: Are the html tags stripped? -->
            <div class="content">{{content}}</div> <!-- ToDo: Are the html tags stripped? and is the content truncated to 120 chars? -->
            <div class="author">{{author}}</div>
            <div class="date">${notice.date} | ${dayjs(notice.date).format('MMM Do YYYY, hh:mm A')}</div>
            <div class="date">${dayjs(notice.date).fromNow()}</div>
            <div class="row">
                <div class="col-sm-8">
                    <div class="social">
                        <span class="comments"><a href="#"><i class="far fa-comment"></i></a>${notice.comments.length}</span>
                        <span class="likes">
                            <a href="#" data-action="like"><i class="far fa-thumbs-up"></i></a> {{likes}}
                            <a href="#" data-action="dislike"><i class="far fa-thumbs-down"></i></a> {{dislikes}}
                        </span>
                    </div> <!-- /.social -->
                </div>
                <div class="col-sm-4 d-flex flex-row-reverse">
                    <a class="view btn btn-default" href="#" role="button">View</a>
                </div>
            </div> <!-- /.row -->
        </div> <!-- /.notice -->
    </div>
</template>

<template id="confirm-cancel-dialog-template">
    <div class="confirm-cancel-dialog">
        <div class="content text-center">
            <h3 class="title d-none"></h3>
            <p class="message">Are you sure you want to cancel?</p>
            <div class="text-right">
                <button type="button" class="btn btn-cancel">No</button>
                <button type="button" class="btn btn-default close-modals">Yes</button>
            </div>
        </div>
    </div>
</template>

<template id="add-notice-form-template">
    <form id="add-notice-form" action="" method="POST">

        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" name="title" id="title" class="form-control" placeholder="Enter your title here">
        </div>

        <div class="form-group">
            <label for="content">Content</label>
            <textarea name="content" id="content" class="form-control" rows="6" placeholder="Enter your content here"></textarea>
        </div>

        <div class="form-group">
            <label for="image">Image Upload</label>
            <input type="file" name="image" id="image" class="form-control-file" multiple>
        </div>

        <div class="text-right">
            <button type="button" class="btn btn-cancel">Cancel</button>
            <button type="submit" class="btn btn-default">Add</button>
        </div>

    </form>
</template>
