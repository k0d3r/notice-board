<!DOCTYPE html>

<html lang="en">

    <head>
        
        <meta charset="utf-8">

        <meta name="viewport" content="initial-scale=1, shrink-to-fit=no">
        
        <meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1">
        
        <title>Notice Board</title>

        <!-- Favicon -->
        <link rel="icon" type="image/png" href="https://cdn2.iconfinder.com/data/icons/simple-website/50/Simple_Business-42-16.png">
        
        <!-- Bootstrap -->
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">

        <!-- Font Awesome Icons -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css" integrity="sha512-1PKOgIY59xJ8Co8+NE6FZ+LOAZKjy+KY8iq0G4B3CyeY6wYHN3yt9PW0XpSriVlkMXe40PTKnXrLnZ9+fkDaog==" crossorigin="anonymous">

        <!-- Roboto Font -->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700&display=swap">

        <!-- Main Stylesheet -->
        <link rel="stylesheet" href="css/notice-board.css">

        <!-- Polyfills -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/webcomponentsjs/2.4.4/webcomponents-loader.min.js" integrity="sha512-uJCcZt3bdFSWoQnmkXGnDRfRjPNS4WpN/UBYf3S9qD0X1NfoD5UYNwufxvMRF1854yYNu9NZW2Nc+eL5o0uRYQ==" crossorigin="anonymous"></script>
    
    </head>

    <body>

        <div class="container-fluid">
        
            <div class="row">

                <div class="col-lg-9">
                    
                    <header>
                        <div class="row justify-content-end">
                            <div class="col-md-3">
                                <a id="add-notice" class="btn btn-default float-right" href="#" role="button"><i class="fas fa-plus-circle"></i> Add Notice</a>
                            </div>
                        </div>
                    </header>
                    
                    <div id="notices">
                        <div class="row"></div>
                    </div>

                    <!-- Only display if your notice count > pagination value -->
                    <nav id="pagination">
                        <ul class="pagination justify-content-center">
                            <li class="page-item">
                                <a class="page-link" href="#" aria-label="Previous">
                                    <span aria-hidden="true">&laquo;</span>
                                </a>
                            </li>
                            <li class="page-item active"><a class="page-link" href="#">1</a></li>
                            <li class="page-item"><a class="page-link" href="#">2</a></li>
                            <li class="page-item"><a class="page-link" href="#">3</a></li>
                            <li class="page-item">
                                <a class="page-link" href="#" aria-label="Next">
                                    <span aria-hidden="true">&raquo;</span>
                                </a>
                            </li>
                        </ul>
                    </nav>

                </div> <!-- /.col-lg-9 -->

                <div id="ads" class="col-lg-3">
                    Right Sidebar
                </div> <!-- /#ads -->

            </div> <!-- /.row -->

        </div> <!-- /.container-fluid -->

        <!-- Content Modal -->
        <div class="content-modal modal" tabindex="-1" role="dialog">
                
            <div class="modal-dialog" role="document">

                <div class="modal-content">

                    <div class="modal-header">
                        <h3 class="modal-title"></h3>
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>

                    <div class="modal-body"></div>
            
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-dismiss="modal">Close</button>
                    </div>

                </div> <!-- /.modal-content -->

            </div> <!-- /.modal-dialog -->

        </div> <!-- /.content-modal -->
        
        <!-- jQuery -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js" integrity="sha512-bLT0Qm9VnAYZDflyKcBaQ2gg0hSYNQrJ8RilYldYQ1FxQYoCLtUjuuRuZo+fjqhx/qtq/1itJ0C2ejDxltZVFg==" crossorigin="anonymous"></script>
        
        <!-- Bootstrap & Bootstrap Dependencies -->
        <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>

        <!-- Sample Data -->
        <script src="js/sample-data.js"></script>

        <script src="js/notice-board.js"></script>
            
    </body>

</html>
