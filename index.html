<!DOCTYPE html>

<html lang="en">

    <head>
        
        <meta charset="utf-8">

        <meta name="viewport" content="initial-scale=1, shrink-to-fit=no">
        
        <meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1">
        
        <title>Notice Board</title>
        
        <!-- Bootstrap -->
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

        <!-- Font Awesome Icons -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.11.2/css/all.css" integrity="sha256-46qynGAkLSFpVbEBog43gvNhfrOj+BmwXdxFgVK/Kvc=" crossorigin="anonymous">

        <!-- Roboto Font -->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700&display=swap">

        <link rel="stylesheet" href="notice-board.css">
    
    </head>

    <body>

        <!-- This is a test commit comment -->

        <div class="container-fluid">
        
            <div class="row">

                <div id="notices" class="col-lg-9">
                    
                    <div class="row"></div>

                </div> <!-- /#notices -->

                <div id="ads" class="col-lg-3">
                    Right Sidebar
                </div> <!-- /#ads -->

            </div> <!-- /.row -->

        </div> <!-- /.container-fluid -->

        <div id="notice-modal" class="modal" tabindex="-1" role="dialog">
        
            <div class="modal-dialog" role="document">
        
                <div class="modal-content">
        
                    <div class="modal-header">
                        <h5 class="modal-title">Modal Title</h5>
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
        
                    <div class="modal-body"></div>
            
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                    </div>
        
                </div> <!-- /.modal-content -->
        
            </div> <!-- /.modal-dialog -->
        
        </div> <!-- /.modal -->
        
        <!-- jQuery -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.js" integrity="sha256-WpOohJOqMqqyKL9FccASB9O0KwACQJpFTUBLTYOVvVU=" crossorigin="anonymous"></script>
        
        <!-- Bootstrap & Bootstrap Dependencies -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>

        <!-- Sample Data -->
        <script src="notice-board-sample-data.js"></script>

        <script src="notice-board.js"></script>
            
    </body>

</html>
