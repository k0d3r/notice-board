<!DOCTYPE html>

        <style>
            
            body {

            }

            .container-fluid {
                max-width: 1200px; 
            }

            #notices {
                padding: 20px 18px 0 18px;
            }
            #notices .notice {
                margin: 0 0 25px 0;
                padding: 11px 18px 15px 18px;
                border: 1px solid #eee;
                border-radius: 3px;
            }
            #notices .notice .title {
                margin: 0 0 10px 0;
                font-size: 1.2em;
                font-weight: bolder;
            }
            #notices .notice .summary {

            }
            #notices .notice .content {
                
            }
            #notices .notice .content p:last-child {
                margin: 0;
            }
            #notices .notice .author {
                margin: 8px 0 0 0;
                font-size: 0.95em;
                color: #495057;
            }
            #notices .notice .date {
                font-size: 0.9em;
                color: #495057;
            }
            #notices .notice .social {
                margin: 9px 0 0 0;
                color: #666;
                font-size: 0.95em;
            }
            #notices .notice .social .comments {
                margin: 0 10px 0 0;
            }
            #notices .notice .social .comments i {
                margin: 0 2px 0 0;
            }
            #notices .notice .social .likes a {
                color: #4183d7;
            }

            

            #ads {
                background: #ccc;
            }

        </style>
    
    </head>

                        <div class="notice shadow">
                            <div class="title">${notice.title}</div>
                            <p class="summary">${notice.summary}</p>

                            <div class="author">Posted by: ${notice.author}</div>
                            <div class="date">${notice.date}</div>
                            <div class="social">

                                        <span class="comments"><i class="far fa-comment"></i>${notice.comments}</span>

            $(function() {

                    alert($(this).data('action') + ' action clicked');
